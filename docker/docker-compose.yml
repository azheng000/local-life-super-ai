version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: lingshui-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lingshui_local_life
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lingshui-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lingshui_local_life
      API_PORT: 3001
      APP_URL: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro

volumes:
  postgres_data:
